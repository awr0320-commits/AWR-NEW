<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnyWear FBX 專業模特兒載入器</title>
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.0/lib/browser.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f5f7 0%, #e5e5e5 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            z-index: 10;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 12px 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .upload-btn {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 16px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .upload-btn:hover {
            background: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.4);
        }

        .upload-btn:active {
            transform: scale(0.95);
        }

        #model-container {
            flex: 1;
            width: 100%;
            cursor: grab;
        }

        #model-container:active {
            cursor: grabbing;
        }

        .controls-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            padding: 24px;
            display: none;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(0, 0, 0, 0.4);
            margin-bottom: 8px;
        }

        input[type=range] {
            width: 100%;
            height: 4px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 2px;
            appearance: none;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            background: #4f46e5;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(79, 70, 229, 0.3);
        }

        #loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(79, 70, 229, 0.1);
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div class="glass-panel">
            <button class="upload-btn" onclick="document.getElementById('fbx-input').click()">
                上傳我的 FBX 模特兒
            </button>
            <input type="file" id="fbx-input" accept=".fbx" style="display: none">
        </div>
    </div>

    <div id="model-container"></div>

    <div id="controls" class="glass-panel controls-panel">
        <div class="control-group">
            <div class="control-label">
                <span>身高 (Height)</span>
                <span id="height-val">1.00x</span>
            </div>
            <input type="range" id="height-slider" min="0.5" max="1.5" step="0.01" value="1.0">
        </div>
        <div class="control-group" style="margin-bottom: 0;">
            <div class="control-label">
                <span>胖瘦 (Body Shape)</span>
                <span id="width-val">1.00x</span>
            </div>
            <input type="range" id="width-slider" min="0.5" max="1.5" step="0.01" value="1.0">
        </div>
    </div>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; font-size: 10px; color: #4f46e5;">正在載入模型...</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, model;
        const container = document.getElementById('model-container');

        function init() {
            // Scene
            scene = new THREE.Scene();
            
            // Camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 5);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.target.set(0, 1, 0);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const spotLight = new THREE.SpotLight(0xffffff, 2);
            spotLight.position.set(10, 10, 10);
            spotLight.castShadow = true;
            scene.add(spotLight);

            const pointLight = new THREE.PointLight(0xffffff, 1);
            pointLight.position.set(-10, 5, -10);
            scene.add(pointLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(0, 5, 5);
            scene.add(dirLight);

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // File Loading
        document.getElementById('fbx-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            loadModel(url);
        });

        function loadModel(url) {
            document.getElementById('loading-overlay').style.display = 'flex';
            
            if (model) scene.remove(model);

            const loader = new FBXLoader();
            loader.load(url, function(object) {
                model = object;

                // 1. Force White Ceramic Material
                const whiteMaterial = new THREE.MeshStandardMaterial({
                    color: 0xffffff,
                    roughness: 0.1,
                    metalness: 0.1,
                    side: THREE.DoubleSide
                });

                model.traverse(function(child) {
                    if (child.isMesh) {
                        child.material = whiteMaterial;
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                // 2. Auto-Focus Logic
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());

                // Reset position to center
                model.position.x += (model.position.x - center.x);
                model.position.y += (model.position.y - center.y);
                model.position.z += (model.position.z - center.z);
                
                // Move to ground level
                const newBox = new THREE.Box3().setFromObject(model);
                model.position.y -= newBox.min.y;

                scene.add(model);

                // Adjust Camera
                const maxDim = Math.max(size.x, size.y, size.z);
                const fov = camera.fov * (Math.PI / 180);
                let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
                cameraZ *= 1.8; // Padding

                camera.position.set(0, size.y / 2, cameraZ);
                controls.target.set(0, size.y / 2, 0);
                camera.updateProjectionMatrix();

                // Show Controls
                document.getElementById('controls').style.display = 'block';
                document.getElementById('loading-overlay').style.display = 'none';
                
                // Reset Sliders
                document.getElementById('height-slider').value = 1.0;
                document.getElementById('width-slider').value = 1.0;
                document.getElementById('height-val').innerText = '1.00x';
                document.getElementById('width-val').innerText = '1.00x';
            }, 
            function(xhr) {
                // Progress
            }, 
            function(error) {
                console.error(error);
                alert('載入失敗，請確認檔案格式是否正確。');
                document.getElementById('loading-overlay').style.display = 'none';
            });
        }

        // Sliders
        document.getElementById('height-slider').addEventListener('input', function(e) {
            const val = parseFloat(e.target.value);
            document.getElementById('height-val').innerText = val.toFixed(2) + 'x';
            if (model) model.scale.y = val;
        });

        document.getElementById('width-slider').addEventListener('input', function(e) {
            const val = parseFloat(e.target.value);
            document.getElementById('width-val').innerText = val.toFixed(2) + 'x';
            if (model) {
                model.scale.x = val;
                model.scale.z = val;
            }
        });

        init();
    </script>
</body>
</html>
